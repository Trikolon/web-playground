<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Photo location from EXIF GPS data</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
        color: #333;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .intro {
        color: #666;
        margin-bottom: 1.5rem;
      }
      #dropzone {
        border: 2px dashed #bbb;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        background: #fafafa;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      #dropzone.dragover {
        border-color: #0969da;
        background: #e8f1fb;
      }
      #dropzone p {
        margin: 0 0 1rem;
        color: #666;
      }
      #fileInput {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      label[for='fileInput'] {
        display: inline-block;
        padding: 10px 20px;
        background: #0969da;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 15px;
      }
      label[for='fileInput']:hover {
        background: #0860c4;
      }
      #result {
        margin-top: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .file-card .coords {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 15px;
        margin: 0.25rem 0;
      }
      .file-card a {
        color: inherit;
        font-weight: 500;
      }
      .file-card {
        padding: 1rem;
        border-radius: 6px;
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      .file-card.info {
        background: #e3f2fd;
        color: #1565c0;
      }
      .file-card.success {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .file-card.warn {
        background: #fff3e0;
        color: #ef6c00;
      }
      .file-card.error {
        background: #ffebee;
        color: #c62828;
      }
      .file-card .thumb {
        flex: 0 0 96px;
        width: 96px;
        height: 96px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-size: 11px;
        color: #888;
        text-align: center;
        padding: 4px;
      }
      .file-card .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .file-card .meta {
        flex: 1;
        min-width: 0;
      }
      .file-card .name {
        font-weight: 600;
        word-break: break-all;
      }
      .file-card .details {
        font-size: 13px;
        color: inherit;
        opacity: 0.8;
        margin-top: 2px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .file-card .body {
        margin-top: 0.5rem;
      }
      @media (prefers-color-scheme: dark) {
        .file-card .thumb {
          background: rgba(255, 255, 255, 0.08);
          color: #aaa;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e0e0e0;
          background: #1a1a1a;
        }
        .intro {
          color: #aaa;
        }
        #dropzone {
          background: #242424;
          border-color: #444;
        }
        #dropzone p {
          color: #aaa;
        }
        #dropzone.dragover {
          background: #1a2a3a;
          border-color: #58a6ff;
        }
        .file-card.info {
          background: #16324d;
          color: #9ec6ff;
        }
        .file-card.success {
          background: #1e3a23;
          color: #aee3b3;
        }
        .file-card.warn {
          background: #3a2a15;
          color: #ffcf99;
        }
        .file-card.error {
          background: #3a1a1a;
          color: #ff9d9d;
        }
      }
    </style>
  </head>
  <body>
    <h1>Photo location from EXIF GPS data</h1>
    <p class="intro">
      Upload an image and this page will read its EXIF metadata in your browser
      to find any embedded GPS coordinates. Nothing is uploaded to a server.
      Supports JPG, PNG (with eXIf chunk), HEIC, TIFF, and WebP.
    </p>

    <div id="dropzone">
      <p>Drop an image here, or</p>
      <label for="fileInput">Choose image</label>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div id="result"></div>

    <script type="module">
      import exifr, {
        fileParsers,
      } from 'https://cdn.jsdelivr.net/npm/exifr@7.1.3/+esm';

      // Two bugs in exifr's stock HEIC detection that affect iPhone photos:
      //   1. It only matches major/compatible brand "heic". iPhones use a mix
      //      of HEIF brands (heix, mif1, MiHB, …).
      //   2. It bails if the ftyp box is larger than 50 bytes, but Apple's HEIC
      //      ftyp boxes are typically 52+ bytes (4+ compatible brands).
      // Patch the static canHandle to widen both checks.
      const heicParser = fileParsers.get('heic');
      if (heicParser) {
        const HEIF_BRANDS = new Set([
          'heic',
          'heix',
          'heim',
          'heis',
          'mif1',
          'msf1',
          'mif2',
          'hevc',
          'hevx',
          'avif',
          'avis',
        ]);
        heicParser.canHandle = function (file, marker) {
          if (marker !== 0) return false;
          const ftypBoxSize = file.getUint32(0);
          if (ftypBoxSize < 16 || ftypBoxSize > 512) return false;
          if (file.getString(4, 4) !== 'ftyp') return false;
          if (HEIF_BRANDS.has(file.getString(8, 4))) return true;
          for (let offset = 16; offset + 4 <= ftypBoxSize; offset += 4) {
            if (HEIF_BRANDS.has(file.getString(offset, 4))) return true;
          }
          return false;
        };
      }

      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('fileInput');
      const result = document.getElementById('result');

      function createCard(file) {
        const ext = file?.name?.includes('.')
          ? file.name.split('.').pop().toLowerCase()
          : '(none)';
        const type = file?.type || 'unknown';
        const size = file ? formatBytes(file.size) : '';

        const card = document.createElement('div');
        card.className = 'file-card';

        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        if (file && file.type.startsWith('image/')) {
          const url = URL.createObjectURL(file);
          const img = document.createElement('img');
          img.src = url;
          img.alt = '';
          // Some formats can't be decoded by the browser (e.g. HEIC outside
          // Safari and recent macOS/Windows Firefox); fall back to a label.
          img.addEventListener('error', () => {
            const span = document.createElement('span');
            span.textContent = '.' + ext;
            img.replaceWith(span);
          });
          // Release the blob URL once the browser has the bytes.
          img.addEventListener('load', () => URL.revokeObjectURL(url), {
            once: true,
          });
          thumb.append(img);
        } else {
          const span = document.createElement('span');
          span.textContent = '.' + ext;
          thumb.append(span);
        }

        const meta = document.createElement('div');
        meta.className = 'meta';

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = file?.name || '(no file)';

        const detailsEl = document.createElement('div');
        detailsEl.className = 'details';
        detailsEl.textContent = `.${ext} · ${type} · ${size}`;

        const body = document.createElement('div');
        body.className = 'body';

        meta.append(nameEl, detailsEl, body);
        card.append(thumb, meta);
        result.prepend(card);

        return { card, body };
      }

      function setCardState(card, body, kind, populateBody) {
        card.className = 'file-card ' + kind;
        body.replaceChildren();
        populateBody(body);
      }

      function textBody(text) {
        return (body) => {
          body.textContent = text;
        };
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes)) return '';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      }

      async function handleFile(file) {
        if (!file) return;
        const { card, body } = createCard(file);

        if (!file.type.startsWith('image/')) {
          setCardState(card, body, 'error', textBody('Not an image file.'));
          return;
        }

        setCardState(card, body, 'info', textBody('Reading EXIF…'));

        try {
          const gps = await exifr.gps(file);
          if (
            gps &&
            Number.isFinite(gps.latitude) &&
            Number.isFinite(gps.longitude)
          ) {
            const lat = gps.latitude.toFixed(6);
            const lon = gps.longitude.toFixed(6);
            setCardState(card, body, 'success', (body) => {
              const heading = document.createElement('strong');
              heading.textContent = 'GPS data found';

              const coords = document.createElement('p');
              coords.className = 'coords';
              coords.append(
                `Latitude: ${lat}`,
                document.createElement('br'),
                `Longitude: ${lon}`,
              );

              const link = document.createElement('a');
              link.href = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=15/${lat}/${lon}`;
              link.target = '_blank';
              link.rel = 'noopener';
              link.textContent = 'View on OpenStreetMap →';

              body.append(heading, coords, link);
            });
          } else {
            setCardState(
              card,
              body,
              'warn',
              textBody('No GPS data found in this image.'),
            );
          }
        } catch (err) {
          console.error('EXIF parse failed:', err);
          setCardState(
            card,
            body,
            'error',
            textBody(`Failed to read EXIF: ${err.message || String(err)}`),
          );
        }
      }

      fileInput.addEventListener('change', (e) => {
        handleFile(e.target.files?.[0]);
      });

      ['dragenter', 'dragover'].forEach((evt) => {
        dropzone.addEventListener(evt, (e) => {
          e.preventDefault();
          dropzone.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((evt) => {
        dropzone.addEventListener(evt, (e) => {
          e.preventDefault();
          if (evt === 'dragleave' && e.target !== dropzone) return;
          dropzone.classList.remove('dragover');
        });
      });

      dropzone.addEventListener('drop', (e) => {
        const file = e.dataTransfer?.files?.[0];
        handleFile(file);
      });
    </script>
  </body>
</html>
